name: CI

on:
  push:
    branches: [main, test]
    paths-ignore:
      - ".vscode/**"
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [main, test]
    paths-ignore:
      - ".vscode/**"
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  format:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  # test:
  #   name: Test
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: oven-sh/setup-bun@v2
  #     - run: bun install --frozen-lockfile
  #     - run: bun test:unit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun audit
